# accelerate config: FSDP2-style sharded training, Gemma-4 compatible.
#
# Per gemma4_learnings.md: TRANSFORMER_BASED_WRAP on Gemma4DecoderLayer breaks
# with `KeyError: 'sliding_attention'` (gemma4 builds a per-attention-type mask
# dict at the top level; per-layer FSDP wrapping disrupts that lookup). Use
# NO_WRAP and let FSDP shard the whole module as one flat unit.
#
# Per §1.2: effective batch 64 = per_device=1 × grad_accum=8 × 8 GPUs. On
# different GPU counts scale grad_accum inversely (4 GPUs → grad_accum=16,
# 16 GPUs → grad_accum=4).
#
# Override num_processes for your node: `accelerate launch --num_processes N`
# at the CLI takes precedence over this file.
compute_environment: LOCAL_MACHINE
debug: false
distributed_type: FSDP
downcast_bf16: 'no'
fsdp_config:
  fsdp_auto_wrap_policy: NO_WRAP
  fsdp_backward_prefetch: BACKWARD_PRE
  fsdp_forward_prefetch: false
  fsdp_cpu_ram_efficient_loading: false
  fsdp_cpu_offload_usage: false
  fsdp_offload_params: false
  fsdp_sharding_strategy: FULL_SHARD
  fsdp_state_dict_type: SHARDED_STATE_DICT
  fsdp_sync_module_states: true
fsdp_state_dict_type: SHARDED_STATE_DICT
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 8
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
